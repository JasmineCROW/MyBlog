backend:
  name: github
  repo: JasmineCROW/MyBlog
  branch: main
  base_url: https://jasminecrow-cms-auth.chenyuye-ycy.workers.dev
  auth_endpoint: auth

locale: zh_Hans

media_folder: source/images/uploads
public_folder: /MyBlog/images/uploads

collections:
  - name: posts
    label: 文章
    summary: "{{title}} · {{date}}"
    folder: source/_posts
    create: true
    extension: md
    format: frontmatter
    slug: "{{slug}}"
    view_filters:
      - label: 已置顶
        field: top
        pattern: "true"
      - label: 普通文章
        field: top
        pattern: "false"
    fields:
      - { label: 标题, name: title, widget: string, hint: "显示在文章页和列表中的标题。" }
      - label: 发布日期
        name: date
        widget: datetime
        hint: "普通文章按发布时间从新到旧排列。"
        format: "YYYY-MM-DD HH:mm:ss"
        date_format: "YYYY-MM-DD"
        time_format: "HH:mm:ss"
      - label: 分类
        name: categories
        widget: category_tree
        required: false
        hint: "选择分类树中的节点，子分类会保存完整层级路径；也可输入新路径。"
      - label: 标签
        name: tags
        widget: tag_picker
        required: false
        hint: "可搜索、多选已有标签，也可直接新建标签。"
      - { label: 摘要, name: excerpt, widget: text, required: false, hint: "可选；用于文章列表摘要。" }
      - { label: 是否置顶, name: top, widget: boolean, default: false, required: false, hint: "开启后显示在首页置顶区，并按发布时间从新到旧排列。" }
      - { label: 正文, name: body, widget: markdown, hint: "支持 Markdown 和图片上传。" }
